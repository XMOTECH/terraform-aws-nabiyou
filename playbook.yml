---
- name: Déploiement automatique de l'application Nabiyou
  hosts: all
  become: yes

  tasks:
    - name: 1. Mettre à jour le catalogue (apt update)
      apt:
        update_cache: yes

    - name: 2. Installer Docker (apt install docker.io)
      apt:
        name: docker.io
        state: present

    - name: 3. Démarrer et activer Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: 4. Nettoyage total (Nom + Port)
      shell: |
        docker rm -f nabiyou-app || true
        port_containers=$(docker ps -aq --filter "publish=80")
        if [ ! -z "$port_containers" ]; then
          docker rm -f $port_containers
        fi
      args:
        executable: /bin/bash

    - name: 5. Lancer le conteneur Nabiyou App
      shell: docker run -d --name nabiyou-app -p 80:80 xmotech/nabiyou-app:v1
