<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 20px;
            box-shadow: 0 0 20px #00ff00;
            border-radius: 10px;
            text-align: center;
        }
        h1 { font-size: 2.5em; text-transform: uppercase; }
        p { font-size: 1.2em; color: #fff; }
        .k8s-badge {
            background: #326ce5;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HACKED BY XMOTECH </h1>
        <p>The software Grower to Software Ships</p>
        <div class="k8s-badge">Kubernetes Power ☸️</div>
    </div>
</body>
</html>
