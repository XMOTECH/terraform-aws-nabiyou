<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            animation: backgroundShift 10s ease-in-out infinite;
        }
        @keyframes backgroundShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .container {
            border: 2px solid #00ff00;
            padding: 20px;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            border-radius: 10px;
            text-align: center;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00; }
            to { box-shadow: 0 0 30px #00ff00, 0 0 60px #00ff00; }
        }
        h1 { 
            font-size: 2.5em; 
            text-transform: uppercase; 
            text-shadow: 0 0 10px #00ff00;
            animation: textGlow 1.5s ease-in-out infinite alternate;
        }
        @keyframes textGlow {
            from { text-shadow: 0 0 10px #00ff00; }
            to { text-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00; }
        }
        p { font-size: 1.2em; color: #fff; }
        .k8s-badge {
            background: #326ce5;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .k8s-badge:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HACKED BY XMOTECH </h1>
        <p>The software Grower to Software Ships</p>
        <div class="k8s-badge">Kubernetes Power ☸️</div>
    </div>
</body>
</html>
